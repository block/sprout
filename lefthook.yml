pre-commit:
  commands:
    rust-fmt:
      run: just fmt-check
    desktop-tauri-fmt:
      run: just desktop-tauri-fmt-check
    desktop-check:
      run: just desktop-check

pre-push:
  parallel: true
  commands:
    rust-fmt:
      run: just fmt-check
    rust-clippy:
      run: just clippy
    rust-tests:
      run: just test-unit
    desktop-check:
      run: just desktop-check
    desktop-tauri-fmt:
      run: just desktop-tauri-fmt-check
    desktop-build:
      run: just desktop-build
    desktop-tauri-check:
      run: just desktop-tauri-check
