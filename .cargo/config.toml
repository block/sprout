# ABOUTME: Cross-compilation rustflags for iOS and Android mobile targets.
# ABOUTME: Used by `just mobile-ios` and `just mobile-android` to build sprout-mobile.

# iOS — device (arm64)
[target.aarch64-apple-ios]
rustflags = [
    "-C", "link-arg=-Wl,-application_extension",
]

# iOS — Apple Silicon simulator
[target.aarch64-apple-ios-sim]
rustflags = [
    "-C", "link-arg=-Wl,-application_extension",
]

# iOS — Intel simulator (legacy)
[target.x86_64-apple-ios]
rustflags = [
    "-C", "link-arg=-Wl,-application_extension",
]

# Android — arm64 (primary)
[target.aarch64-linux-android]
ar = "llvm-ar"
linker = "aarch64-linux-android21-clang"

# Android — armv7 (older devices)
[target.armv7-linux-androideabi]
ar = "llvm-ar"
linker = "armv7a-linux-androideabi21-clang"

# Android — x86_64 emulator
[target.x86_64-linux-android]
ar = "llvm-ar"
linker = "x86_64-linux-android21-clang"

# Android — i686 emulator (legacy)
[target.i686-linux-android]
ar = "llvm-ar"
linker = "i686-linux-android21-clang"
