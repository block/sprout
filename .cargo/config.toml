# ABOUTME: Cross-compilation rustflags for iOS mobile targets.
# ABOUTME: Android linker setup is handled by cargo-ndk (see `just mobile-android`).

# iOS — device (arm64)
[target.aarch64-apple-ios]
rustflags = [
    "-C", "link-arg=-Wl,-application_extension",
]

# iOS — Apple Silicon simulator
[target.aarch64-apple-ios-sim]
rustflags = [
    "-C", "link-arg=-Wl,-application_extension",
]

# iOS — Intel simulator (legacy)
[target.x86_64-apple-ios]
rustflags = [
    "-C", "link-arg=-Wl,-application_extension",
]
