[advisories]
ignore = [
    # instant 0.1.13 — unmaintained crate. Transitive dep: nostr → instant.
    # Will be resolved when nostr crate updates its dependencies.
    { id = "RUSTSEC-2024-0384", reason = "transitive dep via nostr; no upstream fix available" },
    # rustls-webpki 0.101.7 — CRL distribution point matching bug. Transitive dep pinned by
    # old rustls 0.21 stack (via rust-s3). 0.103 branch updated; 0.101 has no fix available.
    { id = "RUSTSEC-2026-0049", reason = "transitive dep via rust-s3 → old rustls stack; 0.101 branch has no fix" },
    # rustls-pemfile 1.0.4 — unmaintained crate. Transitive dep: rust-s3 → rustls-native-certs 0.6 → rustls-pemfile.
    # The tokio-rustls-tls feature of rust-s3 pins an old rustls 0.21 stack internally.
    # Not a security vulnerability — just an unmaintained notice. No fix until rust-s3 updates.
    { id = "RUSTSEC-2025-0134", reason = "transitive dep via rust-s3; no upstream fix available" },
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "OpenSSL",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "MITNFA",
    "MPL-2.0",
]
confidence-threshold = 0.8

[licenses.private]
ignore = true

[bans]
multiple-versions = "deny"
wildcards = "allow"
skip = [
    # Transitive duplicates from sqlx (hashlink) vs axum/hyper dependency chains
    { name = "foldhash" },
    { name = "hashbrown" },
    # rand 0.8 (workspace) vs rand 0.9 (nostr transitive)
    { name = "rand" },
    { name = "rand_chacha" },
    { name = "rand_core" },
    # getrandom 0.2/0.3/0.4 — transitive via rand versions
    { name = "getrandom" },
    # negentropy — nostr transitive dep
    { name = "negentropy" },
    # socket2 — tokio vs reqwest transitive
    { name = "socket2" },
    # tungstenite 0.26 (workspace) vs 0.28 (nostr transitive)
    { name = "tokio-tungstenite" },
    { name = "tungstenite" },
    # webpki-roots — rustls version mismatch (rust-s3 old stack vs modern)
    { name = "webpki-roots" },
    # r-efi — transitive via windows crates
    { name = "r-efi" },
    # windows-* — transitive via various crates on different windows-sys versions
    { name = "windows-core" },
    { name = "windows-link" },
    { name = "windows-result" },
    { name = "windows-strings" },
    { name = "windows-sys" },
    { name = "windows-targets" },
    { name = "windows_aarch64_gnullvm" },
    { name = "windows_aarch64_msvc" },
    { name = "windows_i686_gnu" },
    { name = "windows_i686_msvc" },
    { name = "windows_x86_64_gnu" },
    { name = "windows_x86_64_gnullvm" },
    { name = "windows_x86_64_msvc" },
]
